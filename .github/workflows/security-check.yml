name: Security Check

on: [push, pull_request]

jobs:
  # Caso 1: threat-model.yaml — debe pasar
  validate-main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate threat-model.yaml
        run: python tools/threat_check.py threat-model.yaml

  # Caso 2 y 3: threat-model-auth-example
  validate-auth-example:
    runs-on: ubuntu-latest
    needs: validate-main
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate threat-model-auth-example.yaml
        run: python tools/threat_check.py threat-model-auth-example.yaml
