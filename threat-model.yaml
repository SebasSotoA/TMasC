# Threat Model as Code — Online Store API
# This file is used by the CI/CD pipeline for automated security validation

system: Online Store API

components:
  - name: WebApp
    type: service
  - name: Database
    type: storage

threats:
  - id: T1
    name: SQL Injection
    component: WebApp
  - id: T2
    name: Unauthorized Data Access
    component: Database
    mitigation: Role-based access control and encryption at rest
